<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Team Monitor - 办公场景</title>
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            --game-sidebar-width: 33vw;
        }
        #game-container {
            width: calc(100vw - var(--game-sidebar-width));
            height: 100vh;
            overflow: hidden;
        }
        #game-container canvas {
            display: block;
        }
        .view-switcher {
            position: fixed;
            left: 16px;
            top: 16px;
            z-index: 1100;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
        .view-switcher-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 84px;
            padding: 8px 12px;
            border-radius: 999px;
            color: #555;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s ease;
        }
        .view-switcher-link:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #222;
        }
        .view-switcher-link.active {
            background: #ffffff;
            color: #2b6cb0;
            box-shadow: inset 0 0 0 1px rgba(66, 153, 225, 0.25);
        }
    </style>
</head>
<body>
    <nav class="view-switcher" aria-label="视图切换">
        <a class="view-switcher-link" href="/">暗色面板</a>
        <a class="view-switcher-link active" href="/game/" aria-current="page">办公场景</a>
    </nav>
    <div id="game-container"></div>
    <script type="module" src="/js/game/main.js?v=20260310-1"></script>
</body>
</html>
