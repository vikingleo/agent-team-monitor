<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多智能体团队操控台</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/agent-team-monitor.png">
    <script>
        (() => {
            const storageKey = 'atm-dashboard-theme';
            try {
                const desktopTheme = window.__ATM_DESKTOP_INITIAL_PREFERENCES__?.theme;
                const storedTheme = desktopTheme || localStorage.getItem(storageKey);
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', storedTheme);
                }
            } catch (_) {
            }
        })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-desktop-mode="0">
    <div class="container app-shell" id="app-scroll-root">
        <header>
            <h1>
                <span class="header-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </span>
                多智能体团队操控台
                <small class="header-subtitle">面向 Claude、Codex、OpenClaw 的可视化操控与活动流</small>
            </h1>
            <div class="header-info">
                <div class="header-controls">
                    <nav class="view-switcher" aria-label="视图切换">
                        <a class="view-switcher-link active" href="/" data-desktop-target="/" aria-current="page">操控面板</a>
                        <a class="view-switcher-link" href="/game/" data-desktop-target="/game/">办公场景</a>
                    </nav>
                    <div class="theme-switcher" role="group" aria-label="主题切换">
                        <button class="theme-switcher-button active" type="button" data-theme-choice="light" aria-pressed="true">亮色</button>
                        <button class="theme-switcher-button" type="button" data-theme-choice="dark" aria-pressed="false">暗色</button>
                    </div>
                </div>
                <div class="desktop-toolbar" id="desktop-toolbar" hidden>
                    <span class="desktop-pill" id="desktop-context-pill">桌面应用</span>
                    <span class="desktop-toolbar-view" id="desktop-current-view">操控面板</span>
                    <button class="desktop-toolbar-button" id="desktop-settings-button" type="button">桌面设置</button>
                    <button class="desktop-toolbar-button" id="desktop-about-button" type="button">关于</button>
                    <button class="desktop-toolbar-button" id="desktop-refresh-button" type="button">立即刷新</button>
                    <button class="desktop-toolbar-button" id="desktop-hide-button" type="button">隐藏到托盘</button>
                    <button class="desktop-toolbar-button danger" id="desktop-quit-button" type="button">退出应用</button>
                </div>
                <div class="header-meta">
                    <span id="last-update">最后更新: --:--:--</span>
                    <span class="status-indicator" id="connection-status"><span class="status-dot"></span> 已连接</span>
                    <span class="admin-indicator" id="admin-auth-status">管理：未配置</span>
                    <button class="header-auth-button" id="admin-auth-button" type="button">管理员登录</button>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="view-controls">
                <div class="filter-group" id="provider-filter">
                    <button class="filter-chip active" data-provider="all">全部</button>
                    <button class="filter-chip" data-provider="claude">
                        Claude <span class="filter-chip-count" id="claude-filter-count">(团队:0,成员:0)</span>
                    </button>
                    <button class="filter-chip" data-provider="codex">
                        Codex <span class="filter-chip-count" id="codex-filter-count">(团队:0,成员:0)</span>
                    </button>
                    <button class="filter-chip" data-provider="openclaw">
                        OpenClaw <span class="filter-chip-count" id="openclaw-filter-count">(团队:0,成员:0)</span>
                    </button>
                </div>
                <div class="view-actions">
                    <label class="filter-toggle" for="hide-idle-toggle">
                        <input id="hide-idle-toggle" type="checkbox" checked>
                        自动隐藏空闲
                    </label>
                    <button id="managed-team-open-modal" type="button" class="agent-command-submit managed-team-open-button">创建团队</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" data-tab="teams">
                    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                    活动团队 <span id="teams-count" class="badge">0</span>
                </button>
                <button class="tab-button" data-tab="processes">
                    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg></span>
                    进程 <span id="processes-count" class="badge">0</span>
                </button>
            </div>

            <div id="teams-tab" class="tab-content active">
                <div id="teams-container" class="control-workspace-mount">
                    <p class="loading">加载中...</p>
                </div>
            </div>

            <div id="processes-tab" class="tab-content">
                <div id="processes-container">
                    <p class="loading">加载中...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>每秒自动刷新 | <a href="/game/">办公场景视图</a> | <a href="https://github.com/anthropics/claude-code" target="_blank">Claude Code</a> + <a href="https://openai.com" target="_blank">Codex</a> + <a href="https://github.com/openclaw/openclaw" target="_blank">OpenClaw</a> | <a href="https://github.com/vikingleo/agent-team-monitor" target="_blank">项目仓库</a></p>
        </footer>
    </div>

    <nav id="team-nav" class="team-nav"></nav>
    <div class="desktop-settings-panel" id="desktop-settings-panel" hidden>
        <div class="desktop-settings-card">
                <div class="desktop-settings-title">桌面设置</div>
                <label class="desktop-settings-field" for="desktop-startup-view-select">
                    <span>默认启动视图</span>
                    <select id="desktop-startup-view-select">
                        <option value="dashboard">操控面板</option>
                        <option value="game">办公场景</option>
                    </select>
                </label>
            <label class="desktop-settings-field" for="desktop-provider-filter-select">
                <span>团队来源筛选</span>
                <select id="desktop-provider-filter-select">
                    <option value="all">全部</option>
                    <option value="claude">Claude</option>
                    <option value="codex">Codex</option>
                    <option value="openclaw">OpenClaw</option>
                </select>
            </label>
            <label class="desktop-settings-option" for="desktop-hide-idle-toggle">
                <input id="desktop-hide-idle-toggle" type="checkbox" checked>
                桌面模式默认隐藏空闲成员
            </label>
            <label class="desktop-settings-option" for="desktop-notify-task-completion-toggle">
                <input id="desktop-notify-task-completion-toggle" type="checkbox" checked>
                任务完成时发送系统通知
            </label>
            <label class="desktop-settings-option" for="desktop-notify-stale-agents-toggle">
                <input id="desktop-notify-stale-agents-toggle" type="checkbox" checked>
                成员长时间无活动时通知
            </label>
            <label class="desktop-settings-option" for="desktop-close-to-tray-toggle">
                <input id="desktop-close-to-tray-toggle" type="checkbox" checked>
                关闭窗口时隐藏到托盘
            </label>
            <label class="desktop-settings-option" for="desktop-launch-on-login-toggle">
                <input id="desktop-launch-on-login-toggle" type="checkbox">
                开机自动启动桌面应用
            </label>
            <label class="desktop-settings-option" for="desktop-start-minimized-to-tray-toggle">
                <input id="desktop-start-minimized-to-tray-toggle" type="checkbox">
                启动时直接驻留托盘
            </label>
        </div>
    </div>
    <div id="agent-detail-modal" class="agent-detail-modal" hidden>
        <div class="agent-detail-backdrop" data-close-agent-detail="true"></div>
        <div class="agent-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="agent-detail-title">
            <button class="agent-detail-close" type="button" data-close-agent-detail="true" aria-label="关闭详情">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18"/>
                    <path d="M6 6l12 12"/>
                </svg>
            </button>
            <div id="agent-detail-content" class="agent-detail-content"></div>
        </div>
    </div>
    <div id="auth-modal" class="agent-detail-modal auth-modal" hidden>
        <div class="agent-detail-backdrop" data-close-auth-modal="true"></div>
        <div class="agent-detail-dialog auth-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <button class="agent-detail-close" type="button" data-close-auth-modal="true" aria-label="关闭登录">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18"/>
                    <path d="M6 6l12 12"/>
                </svg>
            </button>
            <div class="agent-detail-content">
                <div class="agent-detail-header">
                    <div class="agent-detail-title-wrap">
                        <div id="auth-modal-title" class="agent-detail-title">管理员登录</div>
                        <div class="agent-detail-subtitle">未登录时仅允许浏览，不可发送消息和修改设置</div>
                    </div>
                </div>
                <form id="auth-login-form" class="auth-form">
                    <label class="auth-field">
                        <span>账号</span>
                        <input id="auth-username" type="text" autocomplete="username" required>
                    </label>
                    <label class="auth-field">
                        <span>密码</span>
                        <input id="auth-password" type="password" autocomplete="current-password" required>
                    </label>
                    <div class="auth-actions">
                        <button id="auth-submit-button" type="submit" class="agent-command-submit">登录</button>
                        <span id="auth-feedback" class="agent-command-feedback"></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="managed-team-modal" class="agent-detail-modal managed-team-modal" hidden>
        <div class="agent-detail-backdrop" data-close-managed-team-modal="true"></div>
        <div class="agent-detail-dialog managed-team-dialog" role="dialog" aria-modal="true" aria-labelledby="managed-team-modal-title">
            <button class="agent-detail-close" type="button" data-close-managed-team-modal="true" aria-label="关闭创建团队">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18"/>
                    <path d="M6 6l12 12"/>
                </svg>
            </button>
            <div class="agent-detail-content">
                <div class="agent-detail-header">
                    <div class="agent-detail-title-wrap">
                        <div id="managed-team-modal-title" class="agent-detail-title">创建受管团队</div>
                        <div class="agent-detail-subtitle">通过弹窗创建，避免长期占用主操控区。</div>
                    </div>
                </div>
                <form id="managed-team-form" class="managed-team-form managed-team-modal-form">
                    <input id="managed-team-name" type="text" placeholder="团队名称，如 db-manage-lead" required>
                    <input id="managed-team-workspace" type="text" placeholder="工作目录，如 /home/vkleo/works/go-project/db-manage" required>
                    <input id="managed-team-model" type="text" placeholder="模型，可选，如 claude-opus-4-1">
                    <select id="managed-team-permission">
                        <option value="">默认权限</option>
                        <option value="default">默认</option>
                        <option value="acceptEdits">自动接受修改</option>
                        <option value="bypassPermissions">跳过权限限制</option>
                    </select>
                    <label class="filter-toggle managed-autostart-toggle" for="managed-team-autostart">
                        <input id="managed-team-autostart" type="checkbox" checked>
                        创建后立即启动全部成员
                    </label>
                    <textarea id="managed-team-initial-task" class="agent-command-input" rows="4" placeholder="可选：创建并启动后，默认发给主成员的首条任务"></textarea>
                    <div class="managed-team-actions-row">
                        <button id="managed-team-submit" type="submit" class="agent-command-submit">创建受管团队</button>
                        <span id="managed-team-feedback" class="agent-command-feedback"></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="/js/desktop-bridge.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
