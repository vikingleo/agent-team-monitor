<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Agent Team 监控器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Claude Agent Team 监控器</h1>
            <div class="header-info">
                <span id="last-update">最后更新: --:--:--</span>
                <span class="status-indicator" id="connection-status">● 已连接</span>
            </div>
        </header>

        <main>
            <!-- Tabs Navigation -->
            <div class="tabs">
                <button class="tab-button active" data-tab="teams">
                    👥 活动团队 <span id="teams-count" class="badge">0</span>
                </button>
                <button class="tab-button" data-tab="processes">
                    📊 进程 <span id="processes-count" class="badge">0</span>
                </button>
            </div>

            <!-- Teams Tab (Default) -->
            <div id="teams-tab" class="tab-content active">
                <div id="teams-container">
                    <p class="loading">加载中...</p>
                </div>
            </div>

            <!-- Processes Tab (Hidden by default) -->
            <div id="processes-tab" class="tab-content">
                <div id="processes-container">
                    <p class="loading">加载中...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>每秒自动刷新 | <a href="https://github.com/anthropics/claude-code" target="_blank">Claude Code</a></p>
        </footer>
    </div>

    <nav id="team-nav" class="team-nav"></nav>
    <script src="js/app.js"></script>
</body>
</html>
