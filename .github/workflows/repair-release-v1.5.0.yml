name: Repair Release v1.5.0

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/repair-release-v1.5.0.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v1.5.0
      APP_NAME: agent-team-monitor
    steps:
      - name: Checkout release tag source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v1.5.0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p release-build
          version="${RELEASE_TAG#v}"

          for platform in \
            darwin/amd64 \
            darwin/arm64 \
            linux/amd64 \
            linux/arm64 \
            windows/amd64 \
            windows/arm64
          do
            IFS='/' read -r goos goarch <<< "${platform}"
            output="release-build/${APP_NAME}-${goos}-${goarch}"
            if [[ "${goos}" == "windows" ]]; then
              output="${output}.exe"
            fi

            echo "building ${goos}/${goarch} -> ${output}"
            GOOS="${goos}" GOARCH="${goarch}" \
              go build -ldflags="-s -w -X main.appVersion=${version}" -o "${output}" ./cmd/monitor
          done

          sha256sum release-build/* > release-build/SHA256SUMS.txt

      - name: Generate release notes
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          ## v1.5.0

          Rebuilt and republished from commit `c5d26ba` to fix the duplicate-agent detail view regression in the Web UI.

          ### Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | macOS | Intel (amd64) | `agent-team-monitor-darwin-amd64` |
          | macOS | Apple Silicon (arm64) | `agent-team-monitor-darwin-arm64` |
          | Linux | amd64 | `agent-team-monitor-linux-amd64` |
          | Linux | arm64 | `agent-team-monitor-linux-arm64` |
          | Windows | amd64 | `agent-team-monitor-windows-amd64.exe` |
          | Windows | arm64 | `agent-team-monitor-windows-arm64.exe` |

          ### Fixed in republished assets

          - Correctly open the latest detail panel when multiple agents share the same name.
          - Rebuild all release binaries from the repaired `v1.5.0` tag source.
          EOF

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file release-notes.md

      - name: Upload replacement assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" release-build/* --clobber
